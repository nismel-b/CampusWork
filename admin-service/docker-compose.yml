# Docker Compose file for Admin Service and its dependencies

version: '3.8'

services:
  admin-db:
    image: postgres:15-alpine
    container_name: admin-db
    environment:
      POSTGRES_DB: admin_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - admin-db-data:/var/lib/postgresql/data
    networks:
      - campus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admin-service
    environment:
      NODE_ENV: development
      PORT: 3004
      DB_HOST: admin-db
      DB_PORT: 5432
      DB_NAME: admin_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      AUTH_SERVICE_URL: http://auth-service:3001
      STUDENT_SERVICE_URL: http://student-service:3002
      LECTURER_SERVICE_URL: http://lecturer-service:3003
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      SERVICE_AUTH_TOKEN: shared-secret-token-between-services
      CORS_ORIGIN: "*"
      LOG_LEVEL: info
    ports:
      - "3004:3004"
    depends_on:
      admin-db:
        condition: service_healthy
    networks:
      - campus-network
    restart: unless-stopped

volumes:
  admin-db-data:

networks:
  campus-network:
    driver: bridge
